name: Deploy to Production (FTP)

on:
  push:
    branches:
      - resturant

# Only one deployment at a time
concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy via FTP
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. PHP + Composer (needed by Vite to resolve Ziggy) ─────
      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, mbstring, openssl, tokenizer, xml, ctype, json, bcmath, zip
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      # ── 3. Node + Vite build ─────────────────────────────────
      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      # ── 3. Deploy via FTP ────────────────────────────────────
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:     ${{ secrets.FTP_SERVER }}
          username:   ${{ secrets.FTP_USERNAME1 }}
          password:   ${{ secrets.FTP_PASSWORD }}
          port:       ${{ secrets.FTP_PORT || 21 }}
          protocol:   ${{ secrets.FTP_PROTOCOL || 'ftp' }}
          local-dir:  ./
          server-dir: ${{ secrets.FTP_SERVER_DIR || '/' }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/vendor/**
            .env
            .env.local
            .env.*.local
            storage/logs/**
            storage/framework/cache/**
            storage/framework/sessions/**
            storage/framework/views/**
            tests/**
            scripts/**
            phpunit.xml
            README.md
            CLAUDE.md
            .editorconfig
            eslint.config.js
            tailwind.config.js
            vite.config.ts
            tsconfig.json
            components.json
            **/*.test.*
            **/*.spec.*

      # ── 4. Notify ────────────────────────────────────────────
      - name: Deployment succeeded
        if: success()
        run: echo "✅ Deployed to ${{ secrets.FTP_SERVER }} successfully."

      - name: Deployment failed
        if: failure()
        run: |
          echo "❌ Deployment FAILED. Check the logs above."
          exit 1
