name: Deploy to Server (FTP)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_pgsql, mbstring, openssl, tokenizer, xml, ctype, json, bcmath
          tools: composer:v2

      - name: Install Composer dependencies (production)
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}
          protocol: ${{ secrets.FTP_PROTOCOL || 'ftp' }}
          local-dir: ./
          server-dir: ${{ secrets.FTP_SERVER_DIR || '/' }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .env
            .env.*
            !.env.example
            storage/logs/**
            storage/framework/cache/**
            storage/framework/sessions/**
            storage/framework/views/**
            tests/**
            phpunit.xml
            README.md
            CLAUDE.md
            .editorconfig
            .eslintrc*
            eslint.config.js
            tailwind.config.js
            vite.config.ts
            tsconfig.json
            components.json
            **/*.test.*
            **/*.spec.*

      - name: Notify on success
        if: success()
        run: echo "Deployment to ${{ secrets.FTP_SERVER }} completed successfully."

      - name: Notify on failure
        if: failure()
        run: echo "Deployment failed. Check the logs above."
